name: Refresh contribution chase

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pacman
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate Pac-Man SVG from contribution graph
        env:
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: node generate.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pacman-contribution.svg contrib.json
          git commit -m "chore: refresh contribution chase" || echo "no changes"
          git push
